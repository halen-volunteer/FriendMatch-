  mail:
    host: smtp.qq.com #邮件服务器地址
    port: 587 #SMTP端口（QQ邮箱推荐587）
    protocol: smtp #协议
    username: 3207723919@qq.com  #发送邮件的邮箱
    password: iooyfyniqnteddjd #邮箱授权码
    default-encoding: utf-8 #邮件内容的编码
    properties:
      mail:
        smtp:
          auth: true #开启SMTP认证
          timeout: 5000 #连接超时时间
          starttls:
            enable: true #开启STARTTLS加密（587端口必需）
            required: true
        debug: false #控制台打印邮件发送日志

  # RabbitMQ 配置
  rabbitmq:
    host: 127.0.0.1                    # RabbitMQ 服务器地址
    port: 5672                         # RabbitMQ 服务器端口
    username: guest                    # RabbitMQ 用户名
    password: guest                    # RabbitMQ 密码
    virtual-host: /                    # 虚拟主机
    connection-timeout: 10000          # 连接超时时间（毫秒）
    publisher-confirms: true           # 启用发布者确认
    publisher-returns: true            # 启用发布者返回
    listener:
      simple:
        acknowledge-mode: manual        # 手动确认消息
        prefetch: 1                     # 每次预取1条消息
        concurrency: 1                  # 并发消费者数
        max-concurrency: 10             # 最大并发消费者数
        retry:
          enabled: true                 # 启用重试
          max-attempts: 3               # 最大重试次数
          initial-interval: 1000        # 初始重试间隔（毫秒）
          multiplier: 1.0               # 重试间隔倍数
          max-interval: 10000           # 最大重试间隔（毫秒）

